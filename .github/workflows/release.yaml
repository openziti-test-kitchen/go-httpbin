# Build and push multi-arch Docker images to Docker Hub when a version tag
# is pushed. The tag triggers a pre-release build; promotion to :latest
# happens separately in promote-downstreams.yaml.

name: Pre-Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: docker.io
  IMAGE_REPO: ${{ vars.GO_HTTPBIN_CONTAINER_IMAGE_REPO || 'openziti/go-httpbin' }}

jobs:
  publish-docker-image:
    runs-on: ubuntu-latest

    steps:
      - name: Set Version from Tag Ref
        id: semver
        run: |
          echo "version=${GITHUB_REF_NAME#v}" | tee -a $GITHUB_OUTPUT

      - uses: actions/checkout@v4

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Set Up Docker BuildKit
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.DOCKER_HUB_API_USER || secrets.DOCKER_HUB_API_USER }}
          password: ${{ secrets.DOCKER_HUB_API_TOKEN }}

      - name: Build & Push Multi-Platform Container Image
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE_REPO }}:${{ steps.semver.outputs.version }}
          provenance: mode=max
          sbom: true
          push: true

  draft-release:
    runs-on: ubuntu-latest
    needs: publish-docker-image
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          EXISTING=$(gh release view "$VERSION" --json isDraft --jq '.isDraft' 2>/dev/null || echo "not_found")

          if [ "$EXISTING" = "true" ]; then
            echo "Draft release $VERSION already exists, updating..."
            gh release edit "$VERSION" \
              --draft \
              --title "$VERSION"
          elif [ "$EXISTING" = "not_found" ]; then
            echo "Creating draft release $VERSION..."
            gh release create "$VERSION" \
              --draft \
              --generate-notes \
              --title "$VERSION"
          else
            echo "Release $VERSION already published (isDraft=$EXISTING), skipping."
          fi
