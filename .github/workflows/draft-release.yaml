# Automatically create or update a draft GitHub release whenever code is
# merged to main. The release version uses the format:
#   <upstream-go-httpbin-semver>_<openziti-sdk-semver>
# For example: 2.19.0_1.4.2

name: draft-release

on:
  push:
    branches: [main]

concurrency:
  group: draft-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute release version
        id: version
        run: |
          # Extract upstream go-httpbin version from the latest v* tag
          UPSTREAM_TAG=$(git describe --tags --match 'v*' --abbrev=0)
          UPSTREAM_VERSION=${UPSTREAM_TAG#v}

          # Extract Ziti SDK version from go.mod
          ZITI_VERSION=$(grep 'github.com/openziti/sdk-golang' go.mod \
            | awk '{print $2}' \
            | sed 's/^v//')

          if [ -z "$UPSTREAM_VERSION" ] || [ -z "$ZITI_VERSION" ]; then
            echo "::error::Failed to compute version components"
            echo "  UPSTREAM_VERSION=${UPSTREAM_VERSION}"
            echo "  ZITI_VERSION=${ZITI_VERSION}"
            exit 1
          fi

          RELEASE_VERSION="${UPSTREAM_VERSION}_${ZITI_VERSION}"

          echo "upstream_version=${UPSTREAM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "ziti_version=${ZITI_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

          echo "Computed version: ${RELEASE_VERSION}"

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.release_version }}
          UPSTREAM: ${{ steps.version.outputs.upstream_version }}
          ZITI: ${{ steps.version.outputs.ziti_version }}
        run: |
          BODY="## go-httpbin ${UPSTREAM} with OpenZiti SDK ${ZITI}

          Based on [go-httpbin v${UPSTREAM}](https://github.com/mccutchen/go-httpbin/releases/tag/v${UPSTREAM}) with OpenZiti networking support via [sdk-golang v${ZITI}](https://github.com/openziti/sdk-golang/releases/tag/v${ZITI}).

          ### Docker Images

          \`\`\`
          docker pull openziti/go-httpbin:${TAG}
          \`\`\`"

          # Check if a release with this tag already exists
          EXISTING=$(gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null || echo "not_found")

          if [ "$EXISTING" = "true" ]; then
            echo "Draft release $TAG already exists, updating..."
            gh release edit "$TAG" \
              --draft \
              --title "v${TAG}" \
              --notes "$BODY"
          elif [ "$EXISTING" = "not_found" ]; then
            echo "Creating new draft release $TAG..."
            gh release create "$TAG" \
              --draft \
              --title "v${TAG}" \
              --notes "$BODY" \
              --target main
          else
            echo "Release $TAG already published (isDraft=$EXISTING), skipping."
          fi
